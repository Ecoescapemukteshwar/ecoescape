[build]
  command = "npm run build"
  publish = "dist"

[[redirects]]
  from = "/index.html"
  to = "/"
  status = 301

[[redirects]]
  from = "/tariffs"
  to = "/rooms"
  status = 301

[[redirects]]
  from = "/contactus"
  to = "/#booking"
  status = 301

# SPA catch-all. Restored after PR #11 because prerender is currently
# disabled on Netlify (no per-route static HTML), and without this rewrite
# every non-root URL returns HTTP 404. When a Linux-compatible Chromium is
# wired up and ENABLE_PRERENDER=1 is set, Netlify will serve the
# prerendered HTML for known routes before falling back to /index.html for
# unknown paths. The trade-off is that unknown paths currently return 200
# with the SPA shell (soft-404) — re-opens audit finding C4 until prerender
# is restored on production.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.webp"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.woff2"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"

[build.environment]
  NODE_VERSION = "18"
