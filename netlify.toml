[build]
  command = "npm run build"
  publish = "dist"

[[redirects]]
  from = "/index.html"
  to = "/"
  status = 301

[[redirects]]
  from = "/tariffs"
  to = "/rooms"
  status = 301

[[redirects]]
  from = "/contactus"
  to = "/#booking"
  status = 301

# SPA catch-all. Required while ENABLE_PRERENDER is unset on Netlify
# (no per-route static HTML), otherwise every non-root URL returns 404.
# When prerender is restored on production via @sparticuz/chromium, the
# prerendered HTML for known routes is served first; this rewrite only
# fires for unknown paths. Trade-off acknowledged: this re-opens audit
# C4 (soft-404 returns 200 with SPA shell). C4 fix returns when
# prerender + dist/404.html flow is back on production.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.webp"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.woff2"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    Content-Security-Policy-Report-Only = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.googletagmanager.com https://www.google-analytics.com https://*.vercel-insights.com https://va.vercel-scripts.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob: https:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https://www.google-analytics.com https://*.googleapis.com https://*.vercel-insights.com https://va.vercel-scripts.com https://formspree.io; frame-src 'self' https://www.google.com https://www.youtube.com https://www.tripadvisor.com; frame-ancestors 'none'; form-action 'self' https://formspree.io; base-uri 'self'; upgrade-insecure-requests"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), interest-cohort=()"

[build.environment]
  NODE_VERSION = "18"
