<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />

    <!-- Preconnect hints. tripadvisor.in / static.tacdn.com used to be
         here for a TripAdvisor widget; the widget was replaced by a plain
         <a> link in the footer, so those origins are no longer hot. -->
    <link rel="preconnect" href="https://www.googletagmanager.com" crossorigin>
    <link rel="dns-prefetch" href="https://www.google-analytics.com">

    <!-- Hero image preload -->
    <link rel="preload" as="image" href="/src/assets/hero-sunrise.webp" fetchpriority="high">

    <!-- scripts/postbuild-optimize.mjs injects <link rel=preload> tags for
         the two critical woff2 font files here at build time, with the
         correct hashed filenames that Vite emits. Done post-build because
         the hashes aren't known at source time. -->

    <!-- Per-page <title>, <meta name="description">, and <link rel="canonical">
         are all written by react-helmet-async via src/seo/PageMeta and frozen
         into the served HTML by scripts/prerender-spa.mjs. Static defaults are
         INTENTIONALLY OMITTED here so the prerendered HTML has exactly one
         canonical and one description per route — the per-page Helmet-set
         values, never a stale homepage fallback that competes with them.
         The <title> tag below is the SPA-shell fallback for the rare case
         where prerender is disabled and Helmet hasn't hydrated yet. -->
    <title>Ecoescape Mukteshwar | Boutique Homestay with Sunrise Views & Garden</title>
    <meta name="author" content="Ecoescape Mukteshwar" />

    <!-- Open Graph (PageMeta overrides per-page) -->
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="en_IN" />
    <meta property="og:image" content="https://ecoescapemukteshwar.com/preview.webp" />
    <meta property="og:site_name" content="Ecoescape Mukteshwar" />

    <!-- Twitter Card (PageMeta overrides per-page) -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="https://ecoescapemukteshwar.com/preview.webp" />

    <!-- Mobile -->
    <meta name="theme-color" content="#3d5a4c" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    
    <!-- Geo -->
    <meta name="geo.region" content="IN-UT" />
    <meta name="geo.placename" content="Mukteshwar" />

    <!-- Search engine verification — owners replace the placeholders with
         the real verification tokens from each console. Google Search
         Console: https://search.google.com/search-console (HTML tag method).
         Bing Webmaster Tools: https://www.bing.com/webmasters. Until then,
         these no-op tags signal to crawlers that verification is intended. -->
    <meta name="google-site-verification" content="REPLACE_WITH_GOOGLE_SEARCH_CONSOLE_TOKEN" />
    <meta name="msvalidate.01" content="REPLACE_WITH_BING_WEBMASTER_TOKEN" />
    <meta name="yandex-verification" content="REPLACE_WITH_YANDEX_TOKEN" />

    <!-- Deferred Google Tag Manager. Loads on first user interaction
         (scroll/pointer/keypress) or after 8s idle, whichever comes first.
         Previously fired on a fixed 3s post-load timer, which still
         landed inside the Lighthouse measurement window — gtag.js was
         the largest source of unused JS (184 KB) and the worst forced-
         reflow culprit (390ms total) in the PageSpeed report. Pushing
         it past first-interaction keeps analytics intact for real users
         while moving it out of the cold-load critical path. -->
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-P1EDMZPGVW');
      (function() {
        var loaded = false;
        function load() {
          if (loaded) return;
          loaded = true;
          var s = document.createElement('script');
          s.src = 'https://www.googletagmanager.com/gtag/js?id=G-P1EDMZPGVW';
          s.async = true;
          document.head.appendChild(s);
          events.forEach(function(e) { window.removeEventListener(e, load, opts); });
        }
        var events = ['scroll', 'pointerdown', 'keydown', 'touchstart'];
        var opts = { once: true, passive: true, capture: true };
        events.forEach(function(e) { window.addEventListener(e, load, opts); });
        // Fallback: load anyway after 8s so visitors who read above-the-fold
        // without interacting still get tracked.
        setTimeout(load, 8000);
      })();
    </script>
    
    <!-- LodgingBusiness JSON-LD is emitted by react-helmet-async via
         src/seo/defaultMeta.ts (defaultSchema) and frozen into the
         prerendered HTML by scripts/prerender-spa.mjs. The previous
         static block here duplicated it with stale geo coords (29.4700/
         79.6200 instead of the canonical 29.4722/79.6472 in siteConfig)
         and a `starRating: "4.9"` value that conflicted with the
         schema-backed `aggregateRating: 4.8`. Removed to keep one
         authoritative LodgingBusiness emission per page. -->

    <!-- FAQ Schema -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What are the check-in and check-out times at Ecoescape Mukteshwar?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Check-in time is 1:00 PM onwards and check-out time is 11:00 AM. Early check-in and late check-out can be arranged on request, subject to availability."
          }
        },
        {
          "@type": "Question",
          "name": "Does Ecoescape Mukteshwar have a restaurant?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes, we have an in-house A La Carte restaurant serving freshly prepared home-cooked meals. We offer terrace dining with mountain views and room service during restaurant hours."
          }
        },
        {
          "@type": "Question",
          "name": "How far is Mukteshwar Dham Temple from Ecoescape?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Mukteshwar Dham Temple is approximately 7 km from our property in Mukteshwar Village."
          }
        },
        {
          "@type": "Question",
          "name": "Is Ecoescape Mukteshwar suitable for remote work?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes! We have high-speed WiFi, power backup, and a peaceful terrace perfect for short workcations. Many guests choose to work remotely from our property."
          }
        }
      ]
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
