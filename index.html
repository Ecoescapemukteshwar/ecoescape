<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />

    <!-- Preconnect hints -->
    <link rel="preconnect" href="https://www.googletagmanager.com">
    <link rel="preconnect" href="https://www.tripadvisor.in">
    <link rel="preconnect" href="https://static.tacdn.com">
    <link rel="dns-prefetch" href="https://www.google-analytics.com">

    <!-- Hero image preload -->
    <link rel="preload" as="image" href="/src/assets/hero-sunrise.webp" fetchpriority="high">

    <!-- Per-page <title>, <meta name="description">, and <link rel="canonical">
         are all written by react-helmet-async via src/seo/PageMeta and frozen
         into the served HTML by scripts/prerender-spa.mjs. Static defaults are
         INTENTIONALLY OMITTED here so the prerendered HTML has exactly one
         canonical and one description per route — the per-page Helmet-set
         values, never a stale homepage fallback that competes with them.
         The <title> tag below is the SPA-shell fallback for the rare case
         where prerender is disabled and Helmet hasn't hydrated yet. -->
    <title>Ecoescape Mukteshwar | Boutique Homestay with Sunrise Views & Garden</title>
    <meta name="author" content="Ecoescape Mukteshwar" />

    <!-- Open Graph (PageMeta overrides per-page) -->
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="en_IN" />
    <meta property="og:image" content="https://ecoescapemukteshwar.com/preview.webp" />
    <meta property="og:site_name" content="Ecoescape Mukteshwar" />

    <!-- Twitter Card (PageMeta overrides per-page) -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="https://ecoescapemukteshwar.com/preview.webp" />

    <!-- Mobile -->
    <meta name="theme-color" content="#3d5a4c" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    
    <!-- Geo -->
    <meta name="geo.region" content="IN-UT" />
    <meta name="geo.placename" content="Mukteshwar" />

    <!-- Search engine verification — owners replace the placeholders with
         the real verification tokens from each console. Google Search
         Console: https://search.google.com/search-console (HTML tag method).
         Bing Webmaster Tools: https://www.bing.com/webmasters. Until then,
         these no-op tags signal to crawlers that verification is intended. -->
    <meta name="google-site-verification" content="REPLACE_WITH_GOOGLE_SEARCH_CONSOLE_TOKEN" />
    <meta name="msvalidate.01" content="REPLACE_WITH_BING_WEBMASTER_TOKEN" />
    <meta name="yandex-verification" content="REPLACE_WITH_YANDEX_TOKEN" />

    <!-- Deferred Google Tag Manager -->
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-P1EDMZPGVW');
      window.addEventListener('load', function() {
        setTimeout(function() {
          var s = document.createElement('script');
          s.src = 'https://www.googletagmanager.com/gtag/js?id=G-P1EDMZPGVW';
          s.async = true;
          document.head.appendChild(s);
        }, 3000);
      });
    </script>
    
    <!-- Schema.org LodgingBusiness + Restaurant -->

      "url": "https://ecoescapemukteshwar.com",
      "telephone": "+919667846787",
      "email": "reservations@ecoescapemukteshwar.com",
      "address": {
        "@type": "PostalAddress",
        "streetAddress": "Mukteshwar Village",
        "addressLocality": "Mukteshwar",
        "addressRegion": "Uttarakhand",
        "postalCode": "263138",
        "addressCountry": "IN"
      },
      "geo": {
        "@type": "GeoCoordinates",
        "latitude": "29.4700",
        "longitude": "79.6200"
      },
      "priceRange": "₹₹",
      "starRating": {
        "@type": "Rating",
        "ratingValue": "4.9"
      },
      "aggregateRating": {
        "@type": "AggregateRating",
        "ratingValue": "4.8",
        "reviewCount": "125",
        "bestRating": "5"
      },
      "amenityFeature": [
        {"@type": "LocationFeatureSpecification", "name": "Free WiFi"},
        {"@type": "LocationFeatureSpecification", "name": "Free Parking"},
        {"@type": "LocationFeatureSpecification", "name": "Sunrise Views"},
        {"@type": "LocationFeatureSpecification", "name": "100+ Plant Garden"},
        {"@type": "LocationFeatureSpecification", "name": "In-house Restaurant"},
        {"@type": "LocationFeatureSpecification", "name": "Terrace Dining"},
        {"@type": "LocationFeatureSpecification", "name": "Room Service"},
        {"@type": "LocationFeatureSpecification", "name": "24/7 CCTV Security"},
        {"@type": "LocationFeatureSpecification", "name": "Power Backup"},
        {"@type": "LocationFeatureSpecification", "name": "Hot Water 24/7"}

    <!-- FAQ Schema -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What are the check-in and check-out times at Ecoescape Mukteshwar?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Check-in time is 1:00 PM onwards and check-out time is 11:00 AM. Early check-in and late check-out can be arranged on request, subject to availability."
          }
        },
        {
          "@type": "Question",
          "name": "Does Ecoescape Mukteshwar have a restaurant?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes, we have an in-house A La Carte restaurant serving freshly prepared home-cooked meals. We offer terrace dining with mountain views and room service during restaurant hours."
          }
        },
        {
          "@type": "Question",
          "name": "How far is Mukteshwar Dham Temple from Ecoescape?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Mukteshwar Dham Temple is approximately 7 km from our property in Mukteshwar Village."
          }
        },
        {
          "@type": "Question",
          "name": "Is Ecoescape Mukteshwar suitable for remote work?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes! We have high-speed WiFi, power backup, and a peaceful terrace perfect for short workcations. Many guests choose to work remotely from our property."
          }
        }
      ]
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
