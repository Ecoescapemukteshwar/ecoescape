<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Photo Tour</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: #FFFFFF;
      color: #222222;
      -webkit-font-smoothing: antialiased;
    }

    /* ==================== ZONE 1 — TOP BAR ==================== */
    .top-bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 56px;
      background-color: #FFFFFF;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      z-index: 1000;
      border-bottom: 1px solid #EEEEEE;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
    }

    .top-bar button {
      width: 44px;
      height: 44px;
      border: none;
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      transition: background-color 0.2s;
    }

    .top-bar button:hover {
      background-color: #F7F7F7;
    }

    .top-bar button:active {
      background-color: #E5E5E5;
    }

    .top-bar button svg {
      width: 24px;
      height: 24px;
      fill: #222222;
    }

    /* ==================== ZONE 2 — THUMBNAIL STRIP ==================== */
    .thumbnail-strip {
      position: fixed;
      top: 56px;
      left: 0;
      right: 0;
      height: 140px;
      background-color: #FFFFFF;
      z-index: 999;
      border-bottom: 1px solid #DDDDDD;
      overflow-x: auto;
      overflow-y: hidden;
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 12px;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }

    .thumbnail-strip::-webkit-scrollbar {
      display: none;
    }

    .thumbnail-card {
      flex-shrink: 0;
      width: 160px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      cursor: pointer;
    }

    .thumbnail-card:first-child {
      margin-left: 0;
    }

    .thumbnail-card-image-wrapper {
      width: 160px;
      height: 110px;
      border-radius: 12px;
      overflow: hidden;
      border: 2px solid transparent;
      transition: border-color 0.15s ease;
    }

    .thumbnail-card.active .thumbnail-card-image-wrapper {
      border-color: #000000;
    }

    .thumbnail-card-image-wrapper img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .thumbnail-card-label {
      font-size: 14px;
      color: #222222;
      font-weight: 500;
      text-align: left;
      padding-left: 2px;
    }

    /* ==================== ZONE 3 — DIVIDER ==================== */
    .divider {
      height: 1px;
      background-color: #DDDDDD;
      width: 100%;
    }

    /* ==================== ZONE 4 — MAIN CONTENT ==================== */
    .main-content {
      padding-top: 197px;
      /* 56px (top bar) + 140px (thumbnail strip) + 1px (divider) */
    }

    .room-section {
      margin-bottom: 0;
    }

    .room-section-header {
      padding: 20px 16px 12px 24px;
      font-size: 26px;
      font-weight: 700;
      color: #222222;
    }

    .room-photos {
      display: flex;
      flex-direction: column;
    }

    .room-photo {
      width: 100%;
      display: block;
      border-radius: 0;
    }

    /* Desktop responsive */
    @media (min-width: 768px) {
      .room-photo {
        max-width: 800px;
        margin: 0 auto;
        display: block;
      }

      .main-content {
        padding-top: 197px;
      }
    }
  </style>
</head>
<body>
  <!-- ZONE 1 — TOP BAR -->
  <div class="top-bar">
    <button onclick="goBack()" aria-label="Go back">
      <svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
        <path d="M20 8L12 16L20 24" stroke="#222222" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
    <button onclick="share()" aria-label="Share">
      <svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
        <path d="M22 16L14 8M22 16L14 24M22 16H10" stroke="#222222" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" transform="rotate(180 16 16) translate(4 0)"/>
        <rect x="6" y="6" width="20" height="20" rx="2" stroke="#222222" stroke-width="2" fill="none"/>
      </svg>
    </button>
  </div>

  <!-- ZONE 2 — THUMBNAIL STRIP -->
  <div class="thumbnail-strip" id="thumbnailStrip">
    <!-- Generated by JS -->
  </div>

  <!-- ZONE 3 — DIVIDER -->
  <div class="divider"></div>

  <!-- ZONE 4 — MAIN CONTENT -->
  <div class="main-content" id="mainContent">
    <!-- Generated by JS -->
  </div>

  <script>
    // Room data with photos
    const rooms = [
      {
        id: 'living-room',
        name: 'Living room',
        photos: [
          'https://picsum.photos/800/600?random=1',
          'https://picsum.photos/800/600?random=2',
          'https://picsum.photos/800/600?random=3'
        ]
      },
      {
        id: 'bedroom-1',
        name: 'Bedroom 1',
        photos: [
          'https://picsum.photos/800/600?random=4',
          'https://picsum.photos/800/600?random=5',
          'https://picsum.photos/800/600?random=6'
        ]
      },
      {
        id: 'bedroom-2',
        name: 'Bedroom 2',
        photos: [
          'https://picsum.photos/800/600?random=7',
          'https://picsum.photos/800/600?random=8'
        ]
      },
      {
        id: 'bathroom',
        name: 'Bathroom',
        photos: [
          'https://picsum.photos/800/600?random=9',
          'https://picsum.photos/800/600?random=10'
        ]
      },
      {
        id: 'kitchen',
        name: 'Kitchen',
        photos: [
          'https://picsum.photos/800/600?random=11',
          'https://picsum.photos/800/600?random=12'
        ]
      },
      {
        id: 'exterior',
        name: 'Exterior',
        photos: [
          'https://picsum.photos/800/600?random=13',
          'https://picsum.photos/800/600?random=14',
          'https://picsum.photos/800/600?random=15'
        ]
      }
    ];

    // Initialize the page
    function init() {
      renderThumbnailStrip();
      renderMainContent();
      setupIntersectionObserver();
      setupKeyboardHandler();

      // Set first room as active
      setActiveRoom(rooms[0].id);
    }

    // Render thumbnail strip
    function renderThumbnailStrip() {
      const strip = document.getElementById('thumbnailStrip');

      rooms.forEach(room => {
        const card = document.createElement('div');
        card.className = 'thumbnail-card';
        card.dataset.roomId = room.id;
        card.onclick = () => scrollToRoom(room.id);

        const imageWrapper = document.createElement('div');
        imageWrapper.className = 'thumbnail-card-image-wrapper';

        const img = document.createElement('img');
        img.src = room.photos[0];
        img.alt = room.name;
        img.loading = 'eager'; // Load first images eagerly

        imageWrapper.appendChild(img);

        const label = document.createElement('div');
        label.className = 'thumbnail-card-label';
        label.textContent = room.name;

        card.appendChild(imageWrapper);
        card.appendChild(label);
        strip.appendChild(card);
      });
    }

    // Render main content
    function renderMainContent() {
      const content = document.getElementById('mainContent');

      rooms.forEach((room, index) => {
        const section = document.createElement('div');
        section.className = 'room-section';
        section.dataset.roomId = room.id;

        const header = document.createElement('div');
        header.className = 'room-section-header';
        header.id = `section-${room.id}`;
        header.textContent = room.name;

        const photosContainer = document.createElement('div');
        photosContainer.className = 'room-photos';

        room.photos.forEach((photoUrl, photoIndex) => {
          const img = document.createElement('img');
          img.src = photoUrl;
          img.alt = `${room.name} photo ${photoIndex + 1}`;
          img.className = 'room-photo';
          img.loading = photoIndex === 0 && index === 0 ? 'eager' : 'lazy';
          photosContainer.appendChild(img);
        });

        section.appendChild(header);
        section.appendChild(photosContainer);
        content.appendChild(section);
      });
    }

    // Set active room in thumbnail strip
    function setActiveRoom(roomId) {
      document.querySelectorAll('.thumbnail-card').forEach(card => {
        if (card.dataset.roomId === roomId) {
          card.classList.add('active');
          // Scroll thumbnail into view
          card.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
        } else {
          card.classList.remove('active');
        }
      });
    }

    // Scroll to room section
    function scrollToRoom(roomId) {
      const section = document.getElementById(`section-${roomId}`);
      if (section) {
        // Account for fixed header
        const yOffset = -197; // Height of fixed elements
        const y = section.getBoundingClientRect().top + window.pageYOffset + yOffset;

        window.scrollTo({ top: y, behavior: 'smooth' });
        setActiveRoom(roomId);
      }
    }

    // Setup Intersection Observer for scroll-spy
    function setupIntersectionObserver() {
      const options = {
        root: null,
        rootMargin: '-40% 0px -40% 0px', // Trigger when section is near top
        threshold: 0
      };

      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            const roomId = entry.target.dataset.roomId;
            setActiveRoom(roomId);
          }
        });
      }, options);

      // Observe each room section header
      document.querySelectorAll('.room-section').forEach(section => {
        observer.observe(section);
      });
    }

    // Keyboard handler
    function setupKeyboardHandler() {
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
          goBack();
        }
      });
    }

    // Back button handler
    function goBack() {
      alert('Back clicked - would navigate to previous page');
    }

    // Share button handler
    function share() {
      alert('Share clicked - would open share sheet');
    }

    // Initialize on load
    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
