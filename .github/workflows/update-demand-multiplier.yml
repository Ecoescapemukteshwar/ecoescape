name: Update Demand Multiplier

on:
  schedule:
    # Run daily at 8 AM IST (2:30 UTC)
    - cron: '30 2 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  update-demand-multiplier:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install pytrends pandas numpy

      - name: Run pricing script
        run: python scripts/pricing.py

      - name: Check if JSON was updated
        id: check_changes
        run: |
          if git diff --quiet public/demand-multiplier.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push if changed
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add public/demand-multiplier.json
          git commit -m "chore: update demand multiplier from Google Trends"
          git push

      - name: Show multiplier value
        run: |
          VALUE=$(python -c "import json; print(json.load(open('public/demand-multiplier.json'))['value'])")
          echo "📊 Current demand multiplier: $VALUE"
